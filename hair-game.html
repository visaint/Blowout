<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kreator Fryzur — Blowout Studio</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #0a0a0a;
                --panel: #111;
                --border: rgba(255, 255, 255, 0.07);
                --mid: #2a2a2a;
                --cream: #f4f2ee;
                --white: #fff;
                --gold: #c8a96e;
                --gdim: rgba(200, 169, 110, 0.14);
                --T: cubic-bezier(0.16, 1, 0.3, 1);
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html {
                overflow-x: hidden;
            }
            body {
                font-family: "Cormorant Garamond", serif;
                background: var(--bg);
                color: var(--cream);
                overflow-x: hidden;
                min-height: 100vh;
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
            }
            #cr {
                position: fixed;
                width: 34px;
                height: 34px;
                border: 1px solid rgba(255, 255, 255, 0.22);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition:
                    width 0.25s var(--T),
                    height 0.25s var(--T),
                    border-color 0.25s;
            }
            #cr.big {
                width: 54px;
                height: 54px;
                border-color: rgba(200, 169, 110, 0.6);
            }
            nav {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 200;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 40px;
                background: rgba(10, 10, 10, 0.95);
                backdrop-filter: blur(16px);
                border-bottom: 1px solid var(--border);
            }
            .nback {
                font-size: 11px;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.4);
                text-decoration: none;
                transition: color 0.3s;
            }
            .nback:hover {
                color: var(--white);
            }
            .ntitle {
                font-family: "Bodoni Moda", serif;
                font-style: italic;
                font-size: 17px;
                color: rgba(255, 255, 255, 0.6);
            }
            .mbar {
                display: flex;
                border: 1px solid var(--border);
            }
            .mbtn {
                font-size: 10px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                padding: 8px 22px;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.3);
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
                transition: all 0.25s;
                position: relative;
            }
            .mbtn + .mbtn {
                border-left: 1px solid var(--border);
            }
            .mbtn.active {
                background: rgba(255, 255, 255, 0.06);
                color: var(--white);
            }
            .mbtn.active::after {
                content: "";
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 1px;
                background: var(--gold);
            }
            .shell {
                display: grid;
                grid-template-columns: 240px 1fr 260px;
                min-height: 100vh;
                padding-top: 52px;
            }
            .panel {
                background: var(--panel);
                border-right: 1px solid var(--border);
                padding: 28px 18px;
                display: flex;
                flex-direction: column;
                gap: 26px;
                overflow-y: auto;
                max-height: calc(100vh - 52px);
            }
            .pr {
                border-right: none;
                border-left: 1px solid var(--border);
            }
            .pt {
                font-size: 9px;
                letter-spacing: 0.42em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.2);
                margin-bottom: 12px;
                padding-bottom: 8px;
                border-bottom: 1px solid var(--border);
            }
            .tgrid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .tbtn {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 5px;
                padding: 12px 6px;
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid var(--border);
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
                transition: all 0.2s;
            }
            .tbtn:hover {
                background: rgba(255, 255, 255, 0.06);
                border-color: rgba(255, 255, 255, 0.14);
            }
            .tbtn.active {
                background: var(--gdim);
                border-color: rgba(200, 169, 110, 0.45);
            }
            .tico {
                font-size: 20px;
                line-height: 1;
            }
            .tlbl {
                font-size: 8px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.35);
            }
            .tbtn.active .tlbl {
                color: var(--gold);
            }
            .slist {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .scat {
                font-size: 8px;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.14);
                padding: 6px 0 3px;
            }
            .si {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 8px 10px;
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid transparent;
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
                transition: all 0.2s;
            }
            .si:hover {
                background: rgba(255, 255, 255, 0.05);
                border-color: var(--border);
            }
            .si.active {
                background: var(--gdim);
                border-color: rgba(200, 169, 110, 0.35);
            }
            .sn {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.6);
            }
            .si.active .sn {
                color: var(--cream);
            }
            .sc {
                font-size: 9px;
                color: rgba(255, 255, 255, 0.18);
                font-style: italic;
            }
            .lw {
                padding: 2px 0;
            }
            .ll {
                display: flex;
                justify-content: space-between;
                font-size: 9px;
                color: rgba(255, 255, 255, 0.25);
                margin-bottom: 10px;
            }
            input[type="range"] {
                width: 100%;
                -webkit-appearance: none;
                height: 1px;
                background: rgba(255, 255, 255, 0.12);
                outline: none;
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 13px;
                height: 13px;
                border-radius: 50%;
                background: var(--white);
                border: 2px solid var(--gold);
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
            }
            .ca {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                background: var(--bg);
                position: relative;
            }
            .stage {
                position: relative;
                width: 300px;
                height: 400px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #avatarSvg {
                width: 300px;
                height: 400px;
                filter: drop-shadow(0 20px 70px rgba(0, 0, 0, 0.85));
            }
            .ctools {
                display: flex;
                gap: 10px;
                margin-top: 24px;
            }
            .cbtn {
                font-size: 9px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                padding: 9px 20px;
                background: none;
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: rgba(255, 255, 255, 0.35);
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
                transition: all 0.3s;
            }
            .cbtn:hover {
                border-color: rgba(255, 255, 255, 0.3);
                color: var(--cream);
            }
            .cbtn.p {
                background: var(--gold);
                color: #0a0a0a;
                border-color: var(--gold);
            }
            .cbtn.p:hover {
                background: var(--cream);
                border-color: var(--cream);
            }
            .pal {
                display: flex;
                flex-wrap: wrap;
                gap: 7px;
            }
            .csw {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                border: 2px solid transparent;
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
                transition:
                    border-color 0.2s,
                    transform 0.2s;
                position: relative;
            }
            .csw:hover {
                transform: scale(1.14);
            }
            .csw.active {
                border-color: var(--white);
                transform: scale(1.18);
            }
            .csw::after {
                content: attr(data-n);
                position: absolute;
                bottom: calc(100% + 5px);
                left: 50%;
                transform: translateX(-50%);
                white-space: nowrap;
                font-size: 9px;
                background: rgba(15, 15, 15, 0.95);
                color: var(--cream);
                padding: 3px 7px;
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.15s;
                z-index: 10;
            }
            .csw:hover::after {
                opacity: 1;
            }
            .fxg {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 5px;
            }
            .fb {
                padding: 8px 5px;
                text-align: center;
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid var(--border);
                font-size: 8px;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.33);
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
                transition: all 0.2s;
            }
            .fb:hover {
                border-color: rgba(255, 255, 255, 0.15);
                color: rgba(255, 255, 255, 0.65);
            }
            .fb.active {
                background: var(--gdim);
                border-color: rgba(200, 169, 110, 0.4);
                color: var(--gold);
            }
            .txg {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
            }
            .lk {
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid var(--border);
                padding: 14px;
            }
            .lkt {
                font-family: "Bodoni Moda", serif;
                font-style: italic;
                font-size: 16px;
                color: var(--gold);
                margin-bottom: 5px;
            }
            .lkd {
                font-size: 12px;
                line-height: 1.7;
                color: rgba(255, 255, 255, 0.38);
            }
            .lkg {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                margin-top: 9px;
            }
            .lkta {
                font-size: 8px;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--gold);
                border: 1px solid rgba(200, 169, 110, 0.25);
                padding: 3px 7px;
            }
            .irow {
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .ilbl {
                font-size: 9px;
                color: rgba(255, 255, 255, 0.22);
                letter-spacing: 0.14em;
                margin-right: 4px;
            }
            .idot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.08);
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
                transition: background 0.2s;
            }
            .idot.active {
                background: var(--gold);
            }
            .mbadge {
                position: absolute;
                bottom: 16px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(10, 10, 10, 0.92);
                border: 1px solid rgba(200, 169, 110, 0.28);
                padding: 8px 22px;
                display: none;
                align-items: center;
                gap: 12px;
                font-size: 9px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.35);
                white-space: nowrap;
            }
            .mbadge.show {
                display: flex;
            }
            .mpct {
                font-family: "Bodoni Moda", serif;
                font-size: 19px;
                color: var(--gold);
            }
            /* Campaign overlay */
            #cLayer {
                position: fixed;
                inset: 0;
                z-index: 150;
                background: rgba(5, 5, 5, 0.97);
                backdrop-filter: blur(18px);
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 20px;
                overflow-y: auto;
            }
            #cLayer.show {
                display: flex;
            }
            .csh {
                width: 100%;
                max-width: 1060px;
                display: grid;
                grid-template-columns: 1fr 320px;
                gap: 52px;
                align-items: start;
            }
            .cprog {
                display: flex;
                gap: 4px;
                margin-bottom: 28px;
            }
            .cpd {
                flex: 1;
                height: 2px;
                background: rgba(255, 255, 255, 0.08);
                transition: background 0.4s;
            }
            .cpd.done {
                background: var(--gold);
            }
            .cpd.cur {
                background: rgba(255, 255, 255, 0.45);
            }
            .chdr {
                display: flex;
                align-items: flex-end;
                gap: 20px;
                margin-bottom: 24px;
            }
            .cface {
                width: 80px;
                height: 106px;
                clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
                background: var(--mid);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 38px;
                flex-shrink: 0;
            }
            .cname {
                font-family: "Bodoni Moda", serif;
                font-size: 22px;
                font-weight: 700;
                color: var(--white);
                margin-bottom: 3px;
            }
            .ctype {
                font-size: 10px;
                letter-spacing: 0.24em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.28);
            }
            .bub {
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.1);
                padding: 22px 26px;
                position: relative;
                margin-bottom: 24px;
            }
            .bub::before {
                content: "";
                position: absolute;
                top: 26px;
                left: -8px;
                width: 13px;
                height: 13px;
                background: rgba(255, 255, 255, 0.04);
                border-left: 1px solid rgba(255, 255, 255, 0.1);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                transform: rotate(45deg);
            }
            .bubt {
                font-size: 17px;
                line-height: 1.75;
                color: rgba(255, 255, 255, 0.72);
                font-style: italic;
            }
            .bubm {
                margin-top: 10px;
                font-size: 9px;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.2);
            }
            .hlist {
                display: flex;
                flex-direction: column;
                gap: 7px;
                margin-bottom: 22px;
            }
            .hrow {
                display: flex;
                align-items: center;
                gap: 11px;
                font-size: 12px;
                color: rgba(255, 255, 255, 0.35);
                padding: 7px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            }
            .hico {
                font-size: 16px;
                width: 24px;
                text-align: center;
            }
            .sbar {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--border);
                margin-bottom: 20px;
            }
            .slbl {
                font-size: 9px;
                letter-spacing: 0.28em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.22);
                flex-shrink: 0;
            }
            .strk {
                flex: 1;
                height: 2px;
                background: rgba(255, 255, 255, 0.07);
            }
            .sfl {
                height: 100%;
                background: var(--gold);
                transition: width 0.5s var(--T);
                width: 0%;
            }
            .snum {
                font-family: "Bodoni Moda", serif;
                font-size: 18px;
                color: var(--gold);
                min-width: 42px;
                text-align: right;
            }
            .csbtn {
                font-size: 11px;
                letter-spacing: 0.24em;
                text-transform: uppercase;
                padding: 15px 38px;
                background: var(--gold);
                color: #0a0a0a;
                border: none;
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
                transition: all 0.3s;
                font-family: "Cormorant Garamond", serif;
            }
            .csbtn:hover {
                background: var(--cream);
            }
            .tlbl2 {
                font-size: 9px;
                letter-spacing: 0.38em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.18);
                margin-bottom: 12px;
            }
            .tframe {
                background: var(--mid);
                border: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 18px;
                position: relative;
            }
            .tframe::after {
                content: "GOAL";
                position: absolute;
                top: 8px;
                right: 8px;
                font-size: 7px;
                letter-spacing: 0.35em;
                color: rgba(200, 169, 110, 0.35);
            }
            .clist {
                display: flex;
                flex-direction: column;
                gap: 5px;
                margin-top: 14px;
            }
            .ci {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.32);
                padding: 5px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            }
            /* Result */
            #rLayer {
                position: fixed;
                inset: 0;
                z-index: 300;
                background: rgba(5, 5, 5, 0.98);
                backdrop-filter: blur(22px);
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 40px;
            }
            #rLayer.show {
                display: flex;
            }
            .rico {
                font-size: 72px;
                margin-bottom: 18px;
            }
            .rgr {
                font-family: "Bodoni Moda", serif;
                font-size: 80px;
                font-weight: 900;
                color: var(--gold);
                line-height: 1;
                margin-bottom: 10px;
            }
            .rti {
                font-size: 22px;
                color: var(--white);
                margin-bottom: 10px;
            }
            .rde {
                font-size: 14px;
                line-height: 1.8;
                color: rgba(255, 255, 255, 0.42);
                max-width: 460px;
                margin: 0 auto 28px;
            }
            .rbs {
                display: flex;
                gap: 10px;
                justify-content: center;
                flex-wrap: wrap;
            }
            .rb {
                font-size: 10px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                padding: 13px 32px;
                background: none;
                border: 1px solid rgba(255, 255, 255, 0.18);
                color: rgba(255, 255, 255, 0.5);
                cursor:
                    url("images/scissors.svg") 8 8,
                    crosshair;
                transition: all 0.3s;
                font-family: "Cormorant Garamond", serif;
            }
            .rb:hover {
                border-color: var(--white);
                color: var(--white);
            }
            .rb.p {
                background: var(--gold);
                border-color: var(--gold);
                color: #0a0a0a;
            }
            .rb.p:hover {
                background: var(--cream);
                border-color: var(--cream);
            }
            .toast {
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(200, 169, 110, 0.95);
                color: #0a0a0a;
                font-family: "Cormorant Garamond", serif;
                font-size: 11px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                padding: 11px 26px;
                z-index: 999;
                animation: fup 0.3s var(--T);
                pointer-events: none;
            }
            @keyframes fup {
                from {
                    opacity: 0;
                    transform: translate(-50%, 12px);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, 0);
                }
            }
            @media (max-width: 900px) {
                .shell {
                    grid-template-columns: 1fr;
                }
                .panel {
                    display: none;
                }
                .csh {
                    grid-template-columns: 1fr;
                    gap: 28px;
                }
                nav {
                    padding: 12px 18px;
                }
            }
        </style>
    </head>
    <body>
        <div id="cr"></div>
        <nav>
            <a href="blowout.html" class="nback">← Blowout Studio</a>
            <div class="ntitle">Kreator Fryzur</div>
            <div class="mbar">
                <button class="mbtn active" id="bFree">✂ Kreator</button>
                <button class="mbtn" id="bCamp">◈ Kampania</button>
            </div>
        </nav>
        <div class="shell">
            <!-- LEFT -->
            <div class="panel">
                <div>
                    <div class="pt">Narzędzia</div>
                    <div class="tgrid">
                        <button class="tbtn active" data-tool="scissors">
                            <span class="tico">✂️</span
                            ><span class="tlbl">Nożyczki</span>
                        </button>
                        <button class="tbtn" data-tool="color">
                            <span class="tico">🎨</span
                            ><span class="tlbl">Farba</span>
                        </button>
                        <button class="tbtn" data-tool="dryer">
                            <span class="tico">💨</span
                            ><span class="tlbl">Suszarka</span>
                        </button>
                        <button class="tbtn" data-tool="toner">
                            <span class="tico">💧</span
                            ><span class="tlbl">Toner</span>
                        </button>
                        <button class="tbtn" data-tool="bleach">
                            <span class="tico">⚗️</span
                            ><span class="tlbl">Rozjaśniacz</span>
                        </button>
                        <button class="tbtn" data-tool="brush">
                            <span class="tico">🪮</span
                            ><span class="tlbl">Szczotka</span>
                        </button>
                    </div>
                </div>
                <div>
                    <div class="pt">Fryzura</div>
                    <div class="slist" id="styleList"></div>
                </div>
                <div>
                    <div class="pt">Długość</div>

            function lerp(a, b, t) {

                ];
            }
            function r2h(r, g, b) {
                return (
                    "#" +
                    [r, g, b]
                        .map((v) =>
                            Math.min(255, Math.max(0, Math.round(v)))
                                .toString(16)
                                .padStart(2, "0"),
                        )
                        .join("")

            }

            }

            }

            // ── BUILD UI ──────────────────────────────────────
            function buildStyles() {
                const el = document.getElementById("styleList");
                el.innerHTML = "";
                const cats = [...new Set(STYLES.map((s) => s.cat))];
                cats.forEach((cat) => {
                    const ch = document.createElement("div");
                    ch.className = "scat";
                    ch.textContent = cat;
                    el.appendChild(ch);
                    STYLES.filter((s) => s.cat === cat).forEach((s) => {
                        const d = document.createElement("div");
                        d.className =
                            "si" + (s.id === GS.styleId ? " active" : "");
                        d.dataset.id = s.id;
                        d.innerHTML = `<span class="sn">${s.name}</span><span class="sc">${s.cat}</span>`;
                        d.addEventListener("click", () => {
                            push();
                            GS.styleId = s.id;
                            GS.length = s.len;
                            document
                                .querySelectorAll(".si")
                                .forEach((i) => i.classList.remove("active"));
                            d.classList.add("active");
                            document.getElementById("ls").value = Math.round(
                                ((s.len - 0.15) / 0.85) * 100,
                            );
                            render();
                        });
                        el.appendChild(d);
                    });
                });
            }
            function buildPal() {
                const p = document.getElementById("pal");
                p.innerHTML = "";
                COLORS.forEach((c, i) => {
                    const sw = document.createElement("div");
                    sw.className = "csw" + (c.h === GS.color ? " active" : "");
                    sw.style.background = c.h;
                    sw.dataset.n = c.name;
                    sw.addEventListener("click", () => {
                        push();
                        if (GS.tool === "toner") {
                            GS.color2 = c.h;
                        } else if (GS.tool === "bleach") {
                            GS.color = lighten(GS.color, 0.32);
                            if (GS.color2) GS.color2 = lighten(GS.color2, 0.35);
                        } else {
                            GS.color = c.h;
                            document
                                .querySelectorAll(".csw")
                                .forEach((s) => s.classList.remove("active"));
                            sw.classList.add("active");
                        }
                        render();
                    });
                    p.appendChild(sw);
                });
            }

            // ── CAMPAIGN ──────────────────────────────────────
            function startCamp() {
                document.getElementById("cLayer").classList.add("show");

            }
            function exitCamp() {
                document.getElementById("cLayer").classList.remove("show");

                document.getElementById("cIntro").style.display = "block";

            function loadCust(idx) {
                const c = CUSTS[idx % CUSTS.length];
                document.getElementById("cIntro").style.display = "block";
                document.getElementById("rLayer").classList.remove("show");
                const pb = document.getElementById("cprog");
                pb.innerHTML = CUSTS.map(
                    (_, i) =>
                        `<div class="cpd ${i < cDone ? "done" : i === idx % CUSTS.length ? "cur" : ""}"></div>`,
                ).join("");
                document.getElementById("cf").textContent = c.emoji;
                document.getElementById("cn").textContent = c.name;
                document.getElementById("ct").textContent = c.type;
                document.getElementById("cs").textContent = c.speech;
                document.getElementById("cm").textContent = c.mood;
                document.getElementById("cl").innerHTML = c.clues
                    .map((x) => `<div class="ci">${x}</div>`)
                    .join("");
                document.getElementById("hl").innerHTML = c.hints
                    .map(
                        (h) =>
                            `<div class="hrow"><span class="hico">${h.i}</span><span>${h.t}</span></div>`,
                    )
                    .join("");
                drawHair(
                    c.tgt.styleId,
                    c.tgt,
                    document.getElementById("tB"),
                    document.getElementById("tF"),
                    0.5,
                );
                document.getElementById("sf").style.width = "0%";
                document.getElementById("sn").textContent = "0%";
                document.getElementById("mp").textContent = "0%";

                .getElementById("bStart")
                .addEventListener("click", () =>
                    document.getElementById("cLayer").classList.remove("show"),
                );

                cDone++;
                cIdx = (cIdx + 1) % CUSTS.length;
                document.getElementById("cLayer").classList.add("show");
                loadCust(cIdx);
            });

            function cSim(a, b) {
                const [ar, ag, ab2] = h2r(a),
                    [br, bg, bb2] = h2r(b);
                return Math.max(
                    0,
                    1 -
                        Math.sqrt(
                            (ar - br) ** 2 + (ag - bg) ** 2 + (ab2 - bb2) ** 2,
                        ) /
                            441,
                );
            }
            function computeScore() {
                const c = CUSTS[cIdx % CUSTS.length].tgt;
                let s = 0;
                if (GS.styleId === c.styleId) s += 40;
                else {
                    const gs = STYLES.find((x) => x.id === GS.styleId),
                        ts = STYLES.find((x) => x.id === c.styleId);
                    if (gs && ts && gs.cat === ts.cat) s += 14;
                }
                s += cSim(GS.color, c.color) * 28;
                if (GS.effect === c.effect) s += 15;
                if (GS.texture === c.texture) s += 10;
                s += Math.max(0, 7 - Math.abs(GS.length - c.length) * 22);
                return Math.min(100, Math.round(s));
            }
            function updateScore() {
                if (mode !== "campaign") return;
                const sc = computeScore();
                document.getElementById("sf").style.width = sc + "%";
                document.getElementById("sn").textContent = sc + "%";
                document.getElementById("mp").textContent = sc + "%";
            }
            function submitResult() {
                const sc = computeScore(),
                    c = CUSTS[cIdx % CUSTS.length];
                let g, ico, ti, de;
                if (sc >= 88) {
                    g = "A+";
                    ico = "⭐⭐⭐";
                    ti = "Mistrzyni!";
                    de = `${c.name} jest absolutnie zachwycona. Właśnie zyskałaś lojalną klientkę na całe życie.`;
                } else if (sc >= 74) {
                    g = "A";
                    ico = "⭐⭐";
                    ti = "Doskonale!";
                    de = `${c.name} wychodzi z salonu z ogromnym uśmiechem.`;
                } else if (sc >= 58) {
                    g = "B";
                    ico = "⭐";
                    ti = "Bardzo dobrze!";
                    de = `${c.name} jest zadowolona. Jeszcze trochę precyzji!`;
                } else if (sc >= 42) {
                    g = "C";
                    ico = "✓";
                    ti = "Nieźle";
                    de = `${c.name} wychodzi bez uwag… ale widziałaś jej minę.`;
                } else {
                    g = "D";
                    ico = "✂";
                    ti = "Potrzeba praktyki";
                    de = `${c.name} taktownie milczy. Spróbuj jeszcze raz!`;
                }
                document.getElementById("ri").textContent = ico;
                document.getElementById("rg").textContent = g;
                document.getElementById("rtt").textContent = ti;
                document.getElementById("rd").textContent = de;
                document.getElementById("cIntro").style.display = "none";
                document.getElementById("cLayer").classList.remove("show");
                document.getElementById("rLayer").classList.add("show");
            }

            // ── CURSOR RING ───────────────────────────────────
            const ring = document.getElementById("cr");
            let mx = 0,
                my = 0,
                rx = 0,
                ry = 0;
            document.addEventListener("mousemove", (e) => {
                mx = e.clientX;
                my = e.clientY;
            });
            (function tick() {
                rx += (mx - rx) * 0.15;
                ry += (my - ry) * 0.15;
                ring.style.left = rx + "px";
                ring.style.top = ry + "px";
                requestAnimationFrame(tick);
            })();
            document
                .querySelectorAll("a,button,.si,.csw,[data-fx],[data-tx],.idot")
                .forEach((e) => {
                    e.addEventListener("mouseenter", () =>
                        ring.classList.add("big"),
                    );
                    e.addEventListener("mouseleave", () =>
                        ring.classList.remove("big"),
                    );
                });

            function toast(msg) {
                const t = document.createElement("div");
                t.className = "toast";
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2400);
            }

            // ── INIT ──────────────────────────────────────────
            buildStyles();
            buildPal();
            render();
            if (new URLSearchParams(location.search).get("mode") === "campaign")
                setTimeout(() => document.getElementById("bCamp").click(), 100);
        </script>
    </body>
</html>
